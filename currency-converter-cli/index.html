<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Converter</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; background: #e9ecef; text-align: center; font-weight: bold; font-size: 18px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Currency Converter</h2>
        
        <div class="input-group">
            <label>Amount (USD):</label>
            <input type="number" id="amountInput" value="1" min="1">
        </div>

        <div class="input-group">
            <label>Convert To:</label>
            <select id="targetCurrency">
                <option value="PKR">PKR (Pakistani Rupee)</option>
                <option value="EUR">EUR (Euro)</option>
                <option value="GBP">GBP (British Pound)</option>
                <option value="AED">AED (UAE Dirham)</option>
            </select>
        </div>

        <button id="convertBtn">Convert Now</button>

        <div id="result"></div>
    </div>

    <!-- CRITICAL: Linking our app module using type="module" -->
    <script type="module" src="app.js"></script>
</body>
</html>
